server:
  #  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: server

  ## Cau hinh DB source cho moi truong DEV
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations=classpath: db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  logging:
    level:
      org.flywaydb: DEBUGS

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

jwt:
  secretkey: ${JWT_SECRET}
  exp: ${JWT_EXPIRE}




